# Weighted A* Planner Configuration
#
# Weighted A* inflates the heuristic to bias search more aggressively toward
# the goal, trading optimality for speed.
#   f(n) = g(n) + w * h(n)
#
# w = 1.0  →  standard A* (optimal)
# w > 1.0  →  faster search, path may be slightly longer

planner: weighted_astar

map:
  resolution: 0.05

robot:
  radius: 0.25

astar:
  connectivity: 8
  heuristic: euclidean
  heuristic_weight: 1.5    # try 1.2, 1.5, 2.0 for ablation study
  allow_diagonal: true

output:
  save_path: true
  save_metrics: true
  save_visualization: true
