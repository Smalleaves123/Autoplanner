# RRT* Planner Configuration
#
# RRT* — asymptotically optimal variant of RRT.
# On top of RRT, it chooses the best-cost parent and rewires nearby nodes.
# Path quality improves with more iterations.

planner: rrt_star

map:
  resolution: 0.05

robot:
  radius: 0.25

rrt_star:
  max_iterations: 8000
  step_size: 2.0
  goal_sample_rate: 0.1
  goal_tolerance: 2.0
  rewire_radius: 5.0             # neighbourhood radius for parent search
  collision_check_resolution: 0.5

output:
  save_tree: true
  save_path: true
  save_metrics: true
