# RRT Planner Configuration
#
# Rapidly-exploring Random Tree — a sampling-based planner that grows a tree
# from the start point into free space.

planner: rrt

map:
  resolution: 0.05

robot:
  radius: 0.25

rrt:
  max_iterations: 5000           # maximum tree growth steps
  step_size: 2.0                 # maximum extension distance per step
  goal_sample_rate: 0.1          # probability of sampling the goal directly
  goal_tolerance: 2.0            # distance to goal considered "reached"
  collision_check_resolution: 0.5 # step size for segment collision checks

output:
  save_tree: true                # save tree edges for visualization
  save_path: true
  save_metrics: true
